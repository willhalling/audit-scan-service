name: Build & Push Scan Service image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to push the new version tag
      packages: write          # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # need full tag history to find latest vN

      - name: Compute next version tag
        id: version
        run: |
          LATEST=$(git tag --list 'v[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1"
          else
            NUM="${LATEST#v}"
            NEXT="v$((NUM + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          git tag "$NEXT"
          git push origin "$NEXT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scan-service:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/scan-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
